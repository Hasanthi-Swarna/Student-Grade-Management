# Server
server.port=8080

# PostgreSQL — override via environment variables in Docker
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gradedb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:c3R1ZGVudC1ncmFkZS1tYW5hZ2VtZW50LXNlY3JldC1rZXktMjAyNQ==}
jwt.expiration.ms=86400000

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# App name
spring.application.name=student-grade-management
