version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    container_name: gradedb
    environment:
      POSTGRES_DB: gradedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: grade-management-api
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/gradedb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: c3R1ZGVudC1ncmFkZS1tYW5hZ2VtZW50LXNlY3JldC1rZXktMjAyNQ==
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
